<!DOCTYPE html>
<html lang="en">


<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>

            <li> <a href="https://www.facebook.com"> Facebook</a></li>
            <li> <a href="https://www.youtube.com"> You tube</a></li>
        </ul>

    <main>
        <h1>Basic HTML Structure</h1>
        <section>
            <h2> Heading 1</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Consequuntur, temporibus?
            </p>

        </section>
        <section>
            <h2> Heading 2</h2>
            <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Earum, animi!</p>

        </section>

    </main>
    <aside>
        <img
          src="https://content.churchofjesuschrist.org/templesldsorg/bc/Temples/photo-galleries/accra-ghana/800x450/accra-ghana-temple-detail-249022-2400x1200.jpg"

        <p>David</p>
    </footer>
